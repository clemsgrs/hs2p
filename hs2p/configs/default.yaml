csv: # path to csv containing slide paths

output_dir: "output" # output directory
resume: false # resume from a previous run
resume_dirname: # directory name to resume from

save_previews: true # save preview images of slide tiling and mask overlays

seed: 0 # seed for reproducibility

tiling:
  read_coordinates_from: # path to a directory containing {sample_id}.coordinates.npz and {sample_id}.coordinates.meta.json (leave empty to compute tiles)
  backend: "asap" # backend to use for slide reading
  params:
    target_spacing_um: 0.5 # spacing at which to tile the slide, in microns per pixel
    tolerance: 0.05 # tolerance for matching the spacing (float between 0 and 1, deciding how much the spacing can deviate from the one specified in the slide metadata)
    target_tile_size_px: 256 # size of the tiles to extract, in pixels
    overlap: 0.0 # percentage of overlap between two consecutive tiles (float between 0 and 1)
    tissue_threshold: 0.01 # minimum fraction of pixels that must be tissue to keep a tile (float between 0 and 1)
    drop_holes: false # whether or not to drop tiles whose center pixel falls withing an identified holes
    use_padding: true # whether to pad the border of the slide
  seg_params:
    # downsample: controls which pyramid level is read for tissue segmentation.
    # A larger value reads a smaller thumbnail → faster segmentation and a smaller in-memory mask.
    # A smaller value reads a higher-resolution thumbnail → slower but more precise tissue boundaries.
    # Practically, values below 16 rarely improve tile selection meaningfully while being significantly slower.
    # Speed impact: thumbnail read time and cv2.integral() cost both scale with the mask area (∝ 1/downsample²).
    downsample: 64 # find the closest downsample in the slide for tissue segmentation
    sthresh: 8 # segmentation threshold (positive integer, using a higher threshold leads to less foreground and more background detection) (not used when use_otsu=True)
    sthresh_up: 255 # upper threshold value for scaling the binary mask
    mthresh: 7 # median filter size (positive, odd integer)
    close: 4 # additional morphological closing to apply following initial thresholding (positive integer)
    use_otsu: false # use otsu's method instead of simple binary thresholding
    use_hsv: true # use HSV thresholding instead of simple binary thresholding
  filter_params:
    ref_tile_size: 16 # reference tile size at the target spacing
    a_t: 4 # area filter threshold for tissue (positive integer, the minimum size of detected foreground contours to consider, relative to the reference tile size ref_tile_size, e.g. a value 10 means only detected foreground contours of size greater than 10 [ref_tile_size, ref_tile_size] tiles at the target spacing will be kept)
    a_h: 2 # area filter threshold for holes (positive integer, the minimum size of detected holes/cavities in foreground contours to avoid, once again relative to the reference tile size ref_tile_size)
    max_n_holes: 8 # maximum of holes to consider per detected foreground contours (positive integer, higher values lead to more accurate patching but increase computational cost ; keeps the biggest holes)
    # filter_white / filter_black: when enabled, each candidate tile is read from the slide at full
    # resolution and its pixel values are inspected. This is the only step in the tiling pipeline
    # that reads actual tile pixel data, and it can be significantly slower than the rest of the
    # pipeline — especially for slides with large internal JPEG tiles (e.g. 4096×4096 blocks),
    # where each tile read triggers a full JPEG decode. Keep these disabled unless necessary.
    filter_white: false # whether to filter out mostly white tiles
    filter_black: false # whether to filter out mostly black tiles
    white_threshold: 220 # threshold for white pixels (0-255)
    black_threshold: 25 # threshold for black pixels (0-255)
    fraction_threshold: 0.9 # fraction of pixels that must be white/black to filter out the tile
  preview:
    downsample: 32 # downsample to use for preview rendering
  sampling_params:
    independent_sampling: false # whether or not to sample tiles independently for each category (if false, tiles will be sampled jointly across all categories, ensuring no overlap between tiles of different categories)
    pixel_mapping: # map annotated categories to their corresponding pixel values
      - 'background': 0
      - 'tissue': 1
    color_mapping: # [r,g,b] color code of overlayed annotation mask, leave blank if you don't want to overlay anything for a given category
      - 'background':
      - 'tissue': [157, 219, 129]
    tissue_percentage: # minimum percentage of tile coverage for each category required to sample tiles, leave blank to not sample from a given category
      - 'background':
      - 'tissue': ${tiling.params.tissue_threshold}

speed:
  num_workers: 8 # number of workers for tiling slides

wandb:
  enable: false
  project: "" # wandb project name
  username: "" # wandb username
  exp_name: "" # wandb experiment name
  tags: ["tiling", "${tiling.params.target_tile_size_px}"] # wandb tags
  dir: "/home/user/"
  group:
  resume_id: "${resume_dirname}"
